
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

</head>

<body>

<h2>Admin Analytics Dashboard</h2>

<div id="stats"></div>

<script>

db.collection("animals").get().then(s=>{
stats.innerHTML+="Total Animals: "+s.size+"<br>"
})

db.collection("market").get().then(s=>{
stats.innerHTML+="Marketplace Posts: "+s.size+"<br>"
})

db.collection("posts").get().then(s=>{
stats.innerHTML+="Farmer Posts: "+s.size+"<br>"
})

</script>

</body>
</html>
