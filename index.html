<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krushiraj - Gapak Dairy Farm</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2d6a4f">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #2d6a4f; --bg: #e6f7ef; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); padding-bottom: 80px; }
        .hidden { display: none !important; }

        /* Dashboard UI */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 20px 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: none; border-left: 5px solid var(--primary); }
        .card i { font-size: 30px; margin-bottom: 8px; color: var(--primary); }
        .card h3 { font-size: 14px; font-weight: bold; color: #333; }
        
        /* Layouts */
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; position: sticky; top: 0; z-index: 100; }
        .section-header { background: white; padding: 15px; font-weight: bold; color: var(--primary); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #ddd; }
        .form-container { background: white; padding: 20px; margin: 15px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        
        /* Inputs */
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn-submit { width: 100%; background: var(--primary); color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .mic-btn { background: #fee2e2; color: #ef4444; border: none; border-radius: 8px; padding: 10px; margin-left: 5px; cursor: pointer; }

        /* Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px; border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); }
        .nav-item { border: none; background: none; color: #666; font-size: 11px; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body onload="checkProfile()">

    <div id="profile-overlay">
        <header><h2>Krushiraj Setup</h2></header>
        <div class="form-container" style="text-align: center;">
            <i class="fas fa-user-circle" style="font-size: 50px; color: var(--primary);"></i>
            <p style="margin: 15px 0;">आपले स्वागत आहे! आधी तुमची माहिती भरा.</p>
            <input type="text" id="user_name" placeholder="तुमचे पूर्ण नाव">
            <button class="btn-submit" onclick="completeSetup()">ॲप सुरू करा</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header>
            <h1 style="font-size: 18px;">कृषिराज - Gapak Dairy Farm</h1>
            <p id="user_id_display" style="font-size: 10px; opacity: 0.8;"></p>
        </header>

        <div id="home-view" class="view">
            <div style="background: #fef08a; padding: 10px; margin: 15px; border-radius: 10px; font-size: 12px; text-align: center;">
                📢 उत्तम प्रतीचे पशुखाद्य उपलब्ध! संपर्क: 9876543210
            </div>
            
            <main class="dashboard-grid">
                <div class="card" onclick="switchTab('animal-view')"><i class="fas fa-cow"></i><h3>पशुपालन</h3></div>
                <div class="card" onclick="switchTab('finance-view')"><i class="fas fa-book"></i><h3>हिशोब डायरी</h3></div>
                <div class="card" onclick="switchTab('market-view')"><i class="fas fa-store"></i><h3>मार्केट</h3></div>
                <div class="card" onclick="switchTab('forum-view')"><i class="fas fa-users"></i><h3>फोरम</h3></div>
                <div class="card" onclick="switchTab('vital-view')"><i class="fas fa-baby-carriage"></i><h3>जन्म-मृत्यू</h3></div>
                <div class="card" onclick="switchTab('help-view')"><i class="fas fa-info-circle"></i><h3>मदत केंद्र</h3></div>
            </main>
        </div>

        <div id="animal-view" class="view hidden">
            <div class="section-header"><i class="fas fa-arrow-left" onclick="switchTab('home-view')"></i> जनावरे नोंदणी</div>
            <div class="form-container">
                <label>जनावराचा प्रकार</label>
                <select id="a_type" onchange="genId()">
                    <option value="गाय">गाय</option><option value="म्हैस">म्हैस</option><option value="बैल">बैल</option>
                    <option value="कालवड">कालवड</option><option value="शेळी">शेळी</option>
                </select>
                <div id="id_box" class="hidden" style="background:#d1fae5; padding:10px; text-align:center; margin:10px 0; border-radius:8px;">ID: <strong id="id_val"></strong></div>
                <label>नाव (बोलून टाईप करा)</label>
                <div style="display: flex;">
                    <input type="text" id="a_name" placeholder="लक्ष्मी, कपिला...">
                    <button class="mic-btn" onclick="startVoice('a_name')"><i class="fas fa-microphone"></i></button>
                </div>
                <button class="btn-submit" onclick="alert('नोंदणी यशस्वी!')">सेव्ह करा</button>
            </div>
        </div>

        <div id="finance-view" class="view hidden">
            <div class="section-header"><i class="fas fa-arrow-left" onclick="switchTab('home-view')"></i> हिशोब व नफा-तोटा</div>
            <div class="form-container" style="background:var(--primary); color:white; text-align:center;">
                <p>या महिन्याचा नफा</p><h2>₹ १५,०००</h2>
            </div>
            <div class="form-container">
                <label>उत्पन्न/खर्च</label>
                <input type="number" placeholder="रक्कम टाका">
                <button class="btn-submit">नोंदवा</button>
            </div>
        </div>

        <div id="market-view" class="view hidden">
            <div class="section-header"><i class="fas fa-arrow-left" onclick="switchTab('home-view')"></i> कृषिराज शॉप</div>
            <div id="market-grid" style="padding:15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                </div>
        </div>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('home-view')"><i class="fas fa-home"></i>मुख्य</button>
            <button class="nav-item" onclick="switchTab('animal-view')"><i class="fas fa-paw"></i>जनावरे</button>
            <button class="nav-item" onclick="switchTab('market-view')"><i class="fas fa-store"></i>मार्केट</button>
            <button class="nav-item" onclick="switchTab('forum-view')"><i class="fas fa-comments"></i>फोरम</button>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyAUuQOnp7aLXmdQWf5t18L1Fk6Fivjtlc4",
            authDomain: "krushiraj.firebaseapp.com",
            projectId: "krushiraj",
            storageBucket: "krushiraj.firebasestorage.app",
            appId: "1:493168112210:web:db46ade9ed23fd4de8258b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // UI Logic
        function checkProfile() {
            if(localStorage.getItem('user_ok')) {
                document.getElementById('profile-overlay').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user_id_display').innerText = "UID: " + localStorage.getItem('user_id');
            }
        }

        function completeSetup() {
            const name = document.getElementById('user_name').value;
            if(!name) return alert("नाव टाका!");
            const uid = "KRU-" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('user_ok', 'true');
            localStorage.setItem('user_id', uid);
            checkProfile();
        }

        function switchTab(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'market-view') loadMarket();
            window.scrollTo(0,0);
        }

        function startVoice(tid) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return alert("तुमच्या फोनमध्ये व्हॉइस सपोर्ट नाही.");
            const recognition = new SpeechRecognition();
            recognition.lang = 'mr-IN';
            recognition.start();
            recognition.onresult = (event) => {
                document.getElementById(tid).value = event.results[0][0].transcript;
            };
        }

        function genId() {
            const t = document.getElementById('a_type').value;
            document.getElementById('id_val').innerText = (t === 'गाय' ? 'COW-' : 'BUF-') + Math.floor(1000+Math.random()*9000);
            document.getElementById('id_box').classList.remove('hidden');
        }

        function loadMarket() {
            db.collection("products").onSnapshot(snap => {
                const grid = document.getElementById('market-grid');
                grid.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    grid.innerHTML += `<div style="background:white; border-radius:10px; overflow:hidden;">
                        <img src="${p.image}" style="width:100%; height:100px; object-fit:cover;">
                        <div style="padding:8px;">
                            <h4 style="font-size:12px;">${p.name}</h4>
                            <p style="color:green; font-weight:bold;">₹ ${p.price}</p>
                        </div>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
