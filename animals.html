
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Animal Management</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

</head>

<body>

<h2>Register Animal</h2>

<input id="name" placeholder="Animal Name">
<input id="type" placeholder="Cow / Buffalo">
<input id="tag" placeholder="Tag Number">

<button onclick="save()">Save</button>

<div id="list"></div>

<script>

function save(){

db.collection("animals").add({
name:name.value,
type:type.value,
tag:tag.value
})

}

db.collection("animals").onSnapshot(s=>{

list.innerHTML=""

s.forEach(d=>{

const a=d.data()

list.innerHTML+=`<p>${a.name} (${a.type}) - Tag ${a.tag}</p>`

})

})

</script>

</body>
</html>
