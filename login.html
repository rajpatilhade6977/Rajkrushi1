
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rajkrushi AI Ultra Login</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
<script src="firebase.js"></script>

</head>

<body>

<h2>Rajkrushi AI Ultra</h2>

<input id="phone" placeholder="+91 Mobile Number">

<div id="recaptcha"></div>

<button onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Login</button>

<script>

window.recaptchaVerifier =
new firebase.auth.RecaptchaVerifier('recaptcha');

function sendOTP(){

firebase.auth().signInWithPhoneNumber(
phone.value,
window.recaptchaVerifier
).then(res=>{

window.confirmationResult=res
alert("OTP Sent")

})

}

function verifyOTP(){

confirmationResult.confirm(otp.value)
.then(()=>{

location.href="dashboard.html"

})

}

</script>

</body>
</html>
