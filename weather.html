
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Weather Alerts</title>
</head>

<body>

<h2>Weather Information</h2>

<div id="weather"></div>

<script>

async function loadWeather(){

const r=await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=19.8762&longitude=75.3433&current_weather=true"
)

const d=await r.json()

weather.innerText="Temperature: "+d.current_weather.temperature+"°C"

}

loadWeather()

</script>

</body>
</html>
